services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_USER: mangal, POSTGRES_PASSWORD: mangal, POSTGRES_DB: mangal }
    # Keep Mangal isolated from any PostgreSQL service already using 5432.
    ports: ["55432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U mangal"], interval: 5s, timeout: 3s, retries: 20 }
  redis:
    image: redis:7-alpine
    # Port 6379 is already used by the existing college_erp_redis container.
    ports: ["6380:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
  minio:
    image: minio/minio:latest
    environment: { MINIO_ROOT_USER: minioadmin, MINIO_ROOT_PASSWORD: minioadmin }
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address :9001
    volumes: [minio_data:/data]
volumes: { postgres_data: {}, redis_data: {}, minio_data: {} }
